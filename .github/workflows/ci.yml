name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff black isort
      - name: Ruff
        run: ruff check src/ tests/ examples/
      - name: Black
        run: black --check src/ tests/ examples/
      - name: isort
        run: isort --check-only src/ tests/ examples/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install numpy cryptography pytest pytest-cov pyyaml
          pip install -e .
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t quantum-crypto-toolkit .
      - name: Run tests in Docker
        run: docker run --rm quantum-crypto-toolkit pytest tests/ -v
